events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # If HTTPS is terminated before this nginx (e.g. cloud LB),
    # preserve original scheme; otherwise fallback to local scheme.
    map $http_x_forwarded_proto $proxy_x_forwarded_proto {
        default $scheme;
        ~*^https$ https;
    }

    upstream django {
        server web:8000;
        keepalive 32;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;

    server {
        listen 80;
        server_name _;

        client_max_body_size 50M;

        # Security headers
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        # Static files (Backend)
        location /static/ {
            alias /app/static/;
            expires 30d;
            access_log off;
        }

        # Media files (Backend - uploaded by users)
        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin *;
            try_files $uri =404;
            access_log /var/log/nginx/media_access.log;
        }

        # Django backend (API and Admin)
        location ~ ^/(api|admin|adminn|refresh|swagger|redoc|schema) {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_redirect off;
        }

        # Frontend (Everything else)
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
