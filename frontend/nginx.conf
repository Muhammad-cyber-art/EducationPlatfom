server {
    listen 80;
    server_name localhost;

    # 1. Vite'ning hashlangan JS/CSS fayllarini abadiy keshlashtirish (assets papkasi)
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # 2. Boshqa barcha fayllarni, xususan index.html ni keshlamaslik (har doim yangi versiyani olishi uchun)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
        
        # Brauzerni keshlamaslikka majburlash
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
    }
}
